<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA NG Financial Advisors Directory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
  body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; padding: 0.75rem; }
  .header { background: #1F4E79; color: white; padding: 1rem 1.25rem; border-radius: 8px; margin-bottom: 1rem; }
  .header h1 { font-size: 16px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .header p { font-size: 11px; opacity: 0.85; }
  .pdf-link { display: none; align-items: center; gap: 8px; background: #fff; border: 1.5px solid #1F4E79; border-radius: 6px; padding: 9px 14px; font-size: 13px; font-weight: 600; color: #1F4E79; text-decoration: none; margin-bottom: 1rem; width: 100%; justify-content: center; }
  .pdf-link:hover { background: #e8f0fb; }
  .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; width: 100%; }
  .controls input[type=text], .controls select { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: white; color: #333; max-width: 100%; }
  .count { font-size: 12px; color: #666; margin-bottom: 0.75rem; }
  .grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .card { background: white; border-radius: 8px; border: 1px solid #e0e0e0; padding: 0.875rem; display: flex; flex-direction: column; gap: 7px; width: 100%; overflow: hidden; }
  .card-location { font-size: 11px; font-weight: 700; color: #1F4E79; text-transform: uppercase; letter-spacing: .04em; }
  .card-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .card-details { border-top: 1px solid #f0f0f0; padding-top: 7px; display: flex; flex-direction: column; gap: 5px; }
  .detail-row { display: flex; align-items: flex-start; gap: 6px; font-size: 13px; color: #555; width: 100%; }
  .detail-row a { color: #1F4E79; text-decoration: none; word-break: break-all; overflow-wrap: break-word; flex: 1; }
  .detail-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: .04em; min-width: 44px; flex-shrink: 0; padding-top: 2px; }
  .share-btn { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; padding: 7px; border: 1px solid #e0e0e0; border-radius: 6px; background: #f9f9f9; cursor: pointer; font-size: 12px; color: #555; width: 100%; font-family: Arial, sans-serif; }
  .share-btn:hover { background: #e8f0fb; color: #1F4E79; border-color: #1F4E79; }
  .status { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
  .last-updated { text-align: right; font-size: 11px; color: #aaa; margin-top: 1rem; }
</style>
</head>
<body>
<div class="header">
  <h1>PA Army National Guard — Personal Financial Counselors</h1>
  <p>Live data &middot; Updates automatically when the roster changes</p>
</div>

<a href="#" target="_blank" class="pdf-link" id="financialPDF">&#128196; Download Financial Advisors Resources (PDF)</a>

<div class="controls">
  <input type="text" id="search" placeholder="Search by name or location..." oninput="onSearch()">
  <select id="locationSelect" onchange="onDropdown()">
    <option value="">-- Filter by location --</option>
  </select>
</div>

<div class="count" id="count">Loading...</div>
<div class="grid" id="grid"><div class="status">Loading directory data...</div></div>
<div class="last-updated" id="updated"></div>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script>
var SHEET_ID = '1hVLTYAhrRDTdEMLsBMmkTWHiz4xwM343hMJKDg9qKyw';
var data = [];

google.charts.load('current', { packages: ['corechart'] });
google.charts.setOnLoadCallback(loadData);

function loadData() {
  new google.visualization.Query('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=Financial%20Advisors&headers=1').send(handleResponse);
  new google.visualization.Query('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=Document%20Links&headers=1').send(function(r) {
    if (r.isError()) return;
    var t = r.getDataTable();
    for (var i = 0; i < t.getNumberOfRows(); i++) {
      if ((t.getValue(i,0)||'').toString().trim() === 'Financial Advisors') {
        var link = (t.getValue(i,1)||'').toString().trim();
        if (link) { var btn = document.getElementById('financialPDF'); btn.href = link; btn.style.display = 'flex'; }
      }
    }
  });
}

function handleResponse(response) {
  if (response.isError()) { document.getElementById('grid').innerHTML = '<div class="status">Error: ' + response.getMessage() + '</div>'; return; }
  var table = response.getDataTable();
  data = [];
  var select = document.getElementById('locationSelect');
  for (var i = 0; i < table.getNumberOfRows(); i++) {
    var location = (table.getValue(i,0)||'').toString().trim();
    if (!location || location.toLowerCase() === 'location') continue;
    data.push({ location: location, name: (table.getValue(i,1)||'').toString().trim(), phone: (table.getValue(i,2)||'').toString().trim(), email: (table.getValue(i,3)||'').toString().trim() });
    var opt = document.createElement('option');
    opt.value = location; opt.textContent = location;
    select.appendChild(opt);
  }
  document.getElementById('updated').textContent = 'Last loaded: ' + new Date().toLocaleString();
  render();
}

function onSearch() { document.getElementById('locationSelect').value = ''; render(); }
function onDropdown() { document.getElementById('search').value = ''; render(); }

function shareContact(index) {
  var d = data[index];
  var lines = [];
  if (d.location) lines.push(d.location);
  if (d.name)     lines.push(d.name);
  if (d.phone)    lines.push('Phone: ' + d.phone);
  if (d.email)    lines.push('Email: ' + d.email);
  var text = lines.join('\n');
  if (navigator.share) { navigator.share({ title: d.name, text: text }).catch(function() { copyText(text); }); }
  else { copyText(text); }
}
function copyText(text) { navigator.clipboard.writeText(text).then(function() { alert('Contact info copied to clipboard!'); }).catch(function() { alert(text); }); }

function render() {
  var q = document.getElementById('search').value.toLowerCase();
  var location = document.getElementById('locationSelect').value;
  var filtered = []; var indices = [];
  data.forEach(function(d, i) {
    var mQ = !q || [d.location,d.name,d.phone,d.email].join(' ').toLowerCase().includes(q);
    var mL = !location || d.location === location;
    if (mQ && mL) { filtered.push(d); indices.push(i); }
  });
  document.getElementById('count').textContent = 'Showing ' + filtered.length + ' of ' + data.length + ' entries';
  if (!filtered.length) { document.getElementById('grid').innerHTML = '<div class="status">No matching entries found.</div>'; return; }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var d = filtered[i]; var idx = indices[i];
    html += '<div class="card">';
    html += '<div class="card-location">&#128205; ' + d.location + '</div>';
    if (d.name) html += '<div class="card-name">' + d.name + '</div>';
    html += '<div class="card-details">';
    if (d.phone) html += '<div class="detail-row"><span class="detail-label">Phone</span><a href="tel:' + d.phone.replace(/\D/g,'') + '">' + d.phone + '</a></div>';
    if (d.email) html += '<div class="detail-row"><span class="detail-label">Email</span><a href="mailto:' + d.email + '">' + d.email + '</a></div>';
    html += '</div>';
    html += '<button class="share-btn" onclick="shareContact(' + idx + ')">&#x1F4E4; Share Contact</button>';
    html += '</div>';
  }
  document.getElementById('grid').innerHTML = html;
}
</script>
</body>
</html>
